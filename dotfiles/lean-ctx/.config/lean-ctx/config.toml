# lean-ctx runtime config (HM-managed dotfile).
# Hook stays inert unless an agent-detection var is set; primary scoping is done
# by where the hook is sourced (claude-code CLAUDE_ENV_FILE / opencode BASH_ENV).
shell_activation = "agents-only"

# The binary is nix-managed — never self-update or nag about updates.
update_check_disabled = true

# Secondary defense for non-MCP invocations (doctor/setup/init): keep lean-ctx out
# of IDE config dirs. The PRIMARY lever for the settings.json mutation is in the
# lean-ctx HM module — LEAN_CTX_HEADLESS=1 on the MCP server, which stops it from
# installing hooks into ~/.claude/settings.json on every claude-code restart.
allow_ide_config_dirs = false

[setup]
# Don't auto-inject rules/skills/MCP during manual setup/update runs — HM owns
# all three (CLAUDE.md/AGENTS.md via store symlinks, MCP via programs.mcp).
auto_inject_rules = false
auto_inject_skills = false
auto_update_mcp = false
